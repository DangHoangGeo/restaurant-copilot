name: Release Checks And Database Migrations

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    name: Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test:ci

  migrate-database:
    name: Apply New SQL Migrations
    if: github.event_name == 'push'
    needs:
      - web-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.ref_name }}
    env:
      MIGRATION_BASE_SHA: ${{ github.event.before }}
      MIGRATION_HEAD_SHA: ${{ github.sha }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Apply new SQL migrations
        run: ./infra/scripts/run_changed_migrations.sh
