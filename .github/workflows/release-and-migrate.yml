name: Supabase Release And Smoke Tests

on:
  push:
    branches:
      - staging
      - main
  pull_request:
    branches:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LOCAL_SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
  SMOKE_RESTAURANT_ID: 11111111-1111-4111-8111-111111111111
  SMOKE_TABLE_ID: 22222222-2222-4222-8222-222222222222
  SMOKE_SUBDOMAIN: smoke-test-branch

jobs:
  web-checks:
    name: Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test:ci

  validate-supabase-foundation:
    name: Validate Supabase Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Create blank Supabase workdir for bootstrap validation
        run: |
          mkdir -p /tmp/bootstrap-validation/supabase/migrations
          cp supabase/config.toml /tmp/bootstrap-validation/supabase/config.toml
          cp -R supabase/functions /tmp/bootstrap-validation/supabase/functions

      - name: Start blank local Supabase stack
        run: supabase start --workdir /tmp/bootstrap-validation -x studio,imgproxy,mailpit,logflare,vector

      - name: Apply canonical Supabase bootstrap to local stack
        env:
          SUPABASE_DB_URL: ${{ env.LOCAL_SUPABASE_DB_URL }}
        run: ./infra/scripts/apply_supabase_baseline.sh

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --workdir /tmp/bootstrap-validation --no-backup

  validate-supabase-migrations:
    name: Validate Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start -x studio,imgproxy,mailpit,logflare,vector

      - name: Replay forward-only migrations on the local app database
        run: supabase db reset --local --no-seed --yes

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  customer-public-smoke:
    name: Customer Public Smoke E2E
    needs:
      - web-checks
      - validate-supabase-foundation
      - validate-supabase-migrations
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Start local Supabase stack
        run: supabase start -x studio,imgproxy,mailpit,logflare,vector

      - name: Replay forward-only migrations on the local app database
        run: supabase db reset --local --no-seed --yes

      - name: Seed customer smoke data
        env:
          SUPABASE_DB_URL: ${{ env.LOCAL_SUPABASE_DB_URL }}
        run: psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -f infra/test_data/customer_public_smoke_seed.sql

      - name: Capture local Supabase service env
        run: supabase status -o env > /tmp/restaurant-copilot-supabase.env

      - name: Start Next.js smoke app
        run: |
          set -a
          source /tmp/restaurant-copilot-supabase.env
          set +a
          cd web
          NEXT_PUBLIC_SUPABASE_URL="${API_URL}" \
          NEXT_PUBLIC_SUPABASE_ANON_KEY="${ANON_KEY}" \
          SUPABASE_SERVICE_ROLE_KEY="${SERVICE_ROLE_KEY}" \
          NEXT_PRIVATE_DEVELOPMENT=true \
          NEXT_PUBLIC_PRODUCTION_URL=localhost \
          NEXT_PUBLIC_ROOT_DOMAIN=localhost \
          NEXT_PUBLIC_APP_URL=http://127.0.0.1:3000 \
          NEXT_TELEMETRY_DISABLED=1 \
          npx next dev --hostname 127.0.0.1 --port 3000 > /tmp/restaurant-copilot-next.log 2>&1 &
          echo $! > /tmp/restaurant-copilot-next.pid

      - name: Wait for Next.js smoke app
        run: |
          for attempt in $(seq 1 60); do
            if curl --silent --show-error --fail "http://127.0.0.1:3000/api/v1/restaurant/data?subdomain=${SMOKE_SUBDOMAIN}&includeMenu=1" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Next.js smoke app did not become ready in time." >&2
          exit 1

      - name: Run customer public smoke test
        env:
          APP_BASE_URL: http://127.0.0.1:3000
          SMOKE_RESTAURANT_ID: ${{ env.SMOKE_RESTAURANT_ID }}
          SMOKE_TABLE_ID: ${{ env.SMOKE_TABLE_ID }}
          SMOKE_SUBDOMAIN: ${{ env.SMOKE_SUBDOMAIN }}
          SMOKE_GUEST_COUNT: 3
        run: node infra/scripts/run_customer_public_smoke.mjs

      - name: Upload Next.js smoke log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: next-smoke-log
          path: /tmp/restaurant-copilot-next.log

      - name: Stop Next.js smoke app
        if: always()
        run: |
          if [[ -f /tmp/restaurant-copilot-next.pid ]]; then
            kill "$(cat /tmp/restaurant-copilot-next.pid)" || true
          fi

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  deploy-staging:
    name: Deploy Staging Supabase
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs:
      - customer-public-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply staging database migrations
        run: ./infra/scripts/apply_supabase_migrations.sh

      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"

  deploy-production:
    name: Deploy Production Supabase
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - customer-public-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply production database migrations
        run: ./infra/scripts/apply_supabase_migrations.sh

      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
